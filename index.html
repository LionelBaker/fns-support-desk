<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DBS Support Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        :root {
            /* Light theme (default) */
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --border-color: #dee2e6;
            --card-bg: #ffffff;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --border-color: #495057;
            --card-bg: #0f3460;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            -webkit-overflow-scrolling: touch;
        }
        
        .widget-container {
            background-color: var(--bg-primary);
            border-radius: 12px;
            box-shadow: 0 4px 15px var(--shadow-color);
            padding: 12px;
            width: 100%;
            max-width: 350px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-shrink: 0;
            padding: 0;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .version-badge {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid var(--border-color);
        }
        
        .theme-toggle, .exit-button {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        
        .theme-toggle:hover, .exit-button:hover {
            background-color: var(--bg-secondary);
        }
        
        .exit-button {
            font-size: 1.4rem;
            margin-left: 5px;
        }
        
        /* Update other elements to use CSS variables */
        .minimize-btn, .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        
        .minimize-btn:hover, .close-btn:hover {
            background-color: var(--bg-secondary);
        }
        
        /* Add more theme-specific styles as needed */
        
        .support-section {
            background-color: var(--bg-secondary);
            border-radius: 8px;
            padding: 12px;
            margin: 0;
        }
        
        #remote-assistance-section .support-section {
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 84px; /* Fixed height for consistent spacing */
        }
        
        #remote-assist-btn {
            margin: 0;
            padding: 10px 16px;
            font-size: 15px;
            line-height: 1.4;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .row {
            margin: 0;
            flex-shrink: 0;
        }
        
        .btn-primary {
            background-color: #2ecc71;
            border-color: #27ae60;
            width: 100%;
            margin: 0;
            padding: 8px 12px;
        }
        
        .btn-primary:hover {
            background-color: #27ae60;
        }
        
        .input-group {
            margin-bottom: 5px;
        }
        
        .section {
            margin-bottom: 5px;
        }
        
        #ai-response, #remote-assist-status {
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.9em;
        }
        
        .logo {
            max-width: 100px;
            display: block;
            margin: 0 auto 15px;
        }
        
        #ticket-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0 4px 0 0;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
            margin-right: -8px;
            padding-right: 8px;
        }
        
        /* Custom scrollbar */
        #ticket-section::-webkit-scrollbar {
            width: 6px;
        }
        
        #ticket-section::-webkit-scrollbar-track {
            background: transparent;
        }
        
        #ticket-section::-webkit-scrollbar-thumb {
            background-color: var(--text-secondary);
            border-radius: 3px;
        }
        
        #ticket-form {
            display: flex;
            flex-direction: column;
            gap: 3px;
            overflow: hidden;
            flex-grow: 1;
        }
        
        .form-group {
            margin: 0;
        }
        
        .form-control {
            font-size: 0.85rem;
            padding: 4px 8px;
            height: auto;
        }
        
        #description {
            min-height: 60px;
            max-height: 80px;
            resize: none;
        }
        
        #remote-assist-status {
            font-size: 0.8rem;
            padding: 5px;
            margin-bottom: 5px;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .performance-metrics {
            flex-shrink: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .progress {
            height: 8px;
            margin: 4px 0;
            background-color: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            width: 100%;
        }
        
        .progress-bar {
            transition: width 0.3s ease;
            min-width: 0%;
            height: 100%;
        }
        
        .performance-metrics .metric {
            margin-bottom: 3px;
        }
        
        .performance-metrics .progress {
            height: 15px;
        }
        
        #ticket-form .btn-primary {
            flex-shrink: 0;
            width: 100%;
            max-width: 330px;
            align-self: center;
            margin-top: 3px;
            padding: 8px;
            font-size: 0.9rem;
        }
        
        label {
            margin-bottom: 1px;
            font-size: 0.8rem;
        }
        
        #remote-assistance-section {
            margin-bottom: 5px;
        }
        
        #remote-assist-btn {
            width: 100%;
            margin-bottom: 3px;
            padding: 8px;
            font-size: 0.9rem;
        }
        
        .toolbox-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--bg-primary);
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 4px 15px var(--shadow-color);
            display: none;
        }
        
        .toolbox-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .toolbox-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .toolbox-body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .toolbox-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .toolbox-item {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 12px 10px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s ease;
            color: var(--text-primary);
        }
        
        .toolbox-item:hover {
            background-color: var(--bg-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .toolbox-item i {
            font-size: 28px;
            margin-bottom: 8px;
            color: #2ecc71; /* Bright green color for better visibility */
            transition: all 0.2s ease;
        }
        
        .toolbox-item:hover i {
            color: #27ae60; /* Slightly darker green on hover */
        }
        
        .toolbox-item span {
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container-fluid widget-container">
        <div class="widget-header">
            <div class="header-left">
                <h5 style="margin: 0; font-weight: 600;">DBS Support Desk</h5>
            </div>
            <div class="header-right">
                <button id="toolbox-toggle" class="theme-toggle" title="DBS Technology Toolbox">
                    <i class="bi bi-gear"></i>
                </button>
                <button id="theme-toggle" class="theme-toggle" title="Toggle theme">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </div>

        <!-- TeamViewer Section -->
        <div id="teamviewer-section" class="row" style="margin-bottom: 0;">
            <div class="col-12">
                <div class="support-section" style="padding: 8px;">
                    <button id="teamviewer-btn" class="btn btn-primary" style="width: 100%;">
                        Launch TeamViewer
                    </button>
                    <div id="teamviewer-status" class="mt-2 text-center" style="margin-bottom: 0;"></div>
                </div>
            </div>
        </div>

        <!-- System Performance Metrics Section -->
        <div class="row" style="margin-top: 4px;">
            <div class="col-12">
                <div class="support-section">
                    <h5 class="text-center">System Performance</h5>
                    <div class="performance-metrics">
                        <div class="metric">
                            <label>HDD Space</label>
                            <div class="progress">
                                <div id="disk-progress" class="progress-bar" role="progressbar"></div>
                            </div>
                            <small id="disk-text" class="text-muted"></small>
                        </div>
                        <div class="metric">
                            <label>Memory</label>
                            <div class="progress">
                                <div id="memory-progress" class="progress-bar" role="progressbar"></div>
                            </div>
                            <small id="memory-text" class="text-muted"></small>
                        </div>
                        <div class="metric">
                            <label>CPU</label>
                            <div class="progress">
                                <div id="cpu-progress" class="progress-bar" role="progressbar"></div>
                            </div>
                            <small id="cpu-text" class="text-muted"></small>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ticket Logging Section -->
        <div id="ticket-section" class="row">
            <div class="col-12">
                <div class="support-section">
                    <h5 class="text-center">Log a Support Ticket</h5>
                    <form id="ticket-form">
                        <div class="form-group">
                            <label for="full-name">Full Name</label>
                            <input type="text" class="form-control" id="full-name" placeholder="Enter your full name" tabindex="1" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" class="form-control" id="email" placeholder="Enter your email" tabindex="2" required>
                        </div>
                        <div class="form-group">
                            <label for="phone-input">Phone Number</label>
                            <input type="tel" class="form-control" id="phone-input" placeholder="Enter your phone number" tabindex="3">
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" class="form-control" id="subject" placeholder="Enter subject" tabindex="4" required>
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea class="form-control" id="description" placeholder="Describe your issue" rows="3" spellcheck="true" oncontextmenu="return true;" tabindex="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Submit Ticket</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- DBS Technology Toolbox Popup -->
    <div id="toolbox-popup" class="toolbox-popup" style="display: none;">
        <div class="toolbox-content">
            <div class="toolbox-header">
                <h5>DBS Technology Toolbox</h5>
                <button id="close-toolbox" class="close-btn">&times;</button>
            </div>
            <div class="toolbox-body">
                <div class="toolbox-grid">
                    <button class="toolbox-item" data-tool="disk-cleanup">
                        <i class="bi bi-trash"></i>
                        <span>Disk Cleanup</span>
                    </button>
                    <button class="toolbox-item" data-tool="uninstall-manager">
                        <i class="bi bi-x-circle"></i>
                        <span>Uninstall Manager</span>
                    </button>
                    <button class="toolbox-item" data-tool="startup-manager">
                        <i class="bi bi-bootstrap-reboot"></i>
                        <span>Startup Manager</span>
                    </button>
                    <button class="toolbox-item" data-tool="memory-optimizer">
                        <i class="bi bi-memory"></i>
                        <span>Memory Optimizer</span>
                    </button>
                    <button class="toolbox-item" data-tool="check-disk">
                        <i class="bi bi-hdd-rack"></i>
                        <span>Check Disk</span>
                    </button>
                    <button class="toolbox-item" data-tool="software-update">
                        <i class="bi bi-arrow-repeat"></i>
                        <span>Software Update</span>
                    </button>
                    <button class="toolbox-item" data-tool="registry-repair">
                        <i class="bi bi-wrench"></i>
                        <span>Registry Repair</span>
                    </button>
                    <button class="toolbox-item" data-tool="registry-defrag">
                        <i class="bi bi-diagram-3"></i>
                        <span>Registry Defrag</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const minimizeBtn = document.getElementById('minimize-btn');
        if (minimizeBtn) {
            minimizeBtn.addEventListener('click', () => {
                window.require('electron').ipcRenderer.send('minimize-window');
            });
        }
    </script>
    <script src="renderer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
